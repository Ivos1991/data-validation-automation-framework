[pytest]
pythonpath = .
testpaths = tests
addopts = -q -rs -p no:cacheprovider
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s - %(message)s
markers =
    service: service-level search validation
    reconciliation: expected vs actual result-set validation
    integration: end-to-end seeded SQLite flow validation
    data_quality: dataset quality validation
